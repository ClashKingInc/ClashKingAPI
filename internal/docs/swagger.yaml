info:
  contact: {}
  description: ClashKing Go API documentation. Public Swagger lists only unauthenticated
    endpoints; private Swagger includes the full API and supports Authorization headers
    for secured endpoints. This API is still under active construction, so use it
    with caution because endpoints and payloads may still change.
  title: ClashKing API
  version: "1.0"
paths:
  /activity:
    get:
      description: Returns scoped activity stats for players.
      parameters:
      - collectionFormat: csv
        description: Player tags
        in: query
        items:
          type: string
        name: player_tags
        type: array
      - collectionFormat: csv
        description: Clan tags
        in: query
        items:
          type: string
        name: clan_tags
        type: array
      - description: Discord server ID
        in: query
        name: server
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get legacy activity stats
      tags:
      - Legacy Stats
  /assets:
    get:
      description: Returns the ClashKing sprite bundle download link.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get legacy asset download link
      tags:
      - Legacy
  /boost-rate:
    get:
      description: Returns boost counts and usage percentages for super troops in
        a season window.
      parameters:
      - description: Start season YYYY-MM
        in: query
        name: start_season
        required: true
        type: string
      - description: End season YYYY-MM
        in: query
        name: end_season
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get super troop boost rates
      tags:
      - Legacy Stats
  /bot/config:
    get:
      description: Returns ClashKing bot configuration for authorized bot tokens.
      parameters:
      - description: Bot token
        in: header
        name: bot_token
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get bot configuration
      tags:
      - Legacy Bot
  /builderbaseleagues:
    get:
      description: Returns legacy builder base league metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get builder base leagues
      tags:
      - Legacy Static Data
  /capital:
    get:
      description: Returns scoped clan capital stats for players.
      parameters:
      - collectionFormat: csv
        description: Player tags
        in: query
        items:
          type: string
        name: player_tags
        type: array
      - collectionFormat: csv
        description: Clan tags
        in: query
        items:
          type: string
        name: clan_tags
        type: array
      - description: Discord server ID
        in: query
        name: server
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get legacy capital stats
      tags:
      - Legacy Capital
  /capital/{clan_tag}:
    get:
      description: Returns stored raid weekends for a clan.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get clan capital raid log
      tags:
      - Legacy Capital
  /capital/bulk:
    post:
      consumes:
      - application/json
      description: Returns stored raid weekends grouped by clan tag.
      parameters:
      - description: Clan tags
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv1.V1CapitalClanTagsBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get capital raid logs in bulk
      tags:
      - Legacy Capital
  /capital/stats/district:
    get:
      description: Returns raid weekend capital district stats.
      parameters:
      - description: Weekend filter
        in: query
        name: weekend
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get capital district stats
      tags:
      - Legacy Capital
  /capital/stats/leagues:
    get:
      description: Returns raid weekend capital league stats.
      parameters:
      - description: Weekend filter
        in: query
        name: weekend
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get capital league stats
      tags:
      - Legacy Capital
  /ck/bulk:
    post:
      consumes:
      - application/json
      description: Proxies multiple Clash API paths and returns successful JSON responses.
      parameters:
      - description: Bearer internal API token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Proxy paths
        in: body
        name: body
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Proxy bulk Clash API requests
      tags:
      - Legacy Proxy
  /clan-games:
    get:
      description: Returns scoped clan games stats for players.
      parameters:
      - collectionFormat: csv
        description: Player tags
        in: query
        items:
          type: string
        name: player_tags
        type: array
      - collectionFormat: csv
        description: Clan tags
        in: query
        items:
          type: string
        name: clan_tags
        type: array
      - description: Discord server ID
        in: query
        name: server
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get legacy clan games stats
      tags:
      - Legacy Stats
  /clan/{clan_tag}/basic:
    get:
      description: Returns tracked basic clan data for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get basic clan data
      tags:
      - Legacy Clans
  /clan/{clan_tag}/historical:
    get:
      description: Returns tracked player history events for a clan.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Start Unix timestamp
        in: query
        name: timestamp_start
        type: integer
      - description: End Unix timestamp
        in: query
        name: time_stamp_end
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get clan historical events
      tags:
      - Legacy Clans
  /clan/{clan_tag}/join-leave:
    get:
      description: Returns tracked join and leave events for a clan.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Start Unix timestamp
        in: query
        name: timestamp_start
        type: integer
      - description: End Unix timestamp
        in: query
        name: time_stamp_end
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get clan join-leave history
      tags:
      - Legacy Clans
  /clan/search:
    get:
      description: Returns tracked clans with optional location filtering.
      parameters:
      - description: Location ID
        in: query
        name: location_id
        type: integer
      - description: Maximum number of clans
        in: query
        name: limit
        type: integer
      - description: Include member tags
        in: query
        name: member_list
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Search tracked clans
      tags:
      - Legacy Clans
  /cwl/{clan_tag}/{season}:
    get:
      description: Returns the CWL group for a clan and season.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Season YYYY-MM
        in: path
        name: season
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get CWL group by season
      tags:
      - Legacy War
  /cwl/{clan_tag}/group:
    get:
      description: Returns the current season CWL group for a clan.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get current CWL group
      tags:
      - Legacy War
  /discord_links:
    post:
      consumes:
      - application/json
      description: Returns Discord user IDs linked to the provided player tags.
      parameters:
      - description: Player tags
        in: body
        name: body
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get Discord links for player tags
      tags:
      - Legacy Links
  /donations:
    get:
      description: Returns scoped donation stats for players.
      parameters:
      - collectionFormat: csv
        description: Player tags
        in: query
        items:
          type: string
        name: player_tags
        type: array
      - collectionFormat: csv
        description: Clan tags
        in: query
        items:
          type: string
        name: clan_tags
        type: array
      - description: Discord server ID
        in: query
        name: server
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get legacy donation stats
      tags:
      - Legacy Stats
  /global/counts:
    get:
      description: Returns global tracking counts used by legacy clients.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get global ClashKing counts
      tags:
      - Legacy Stats
  /guild_links/{guild_id}:
    get:
      description: Returns linked player data for a Discord guild.
      parameters:
      - description: Discord guild ID
        in: path
        name: guild_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get guild links
      tags:
      - Legacy Links
  /json/{data_type}:
    get:
      description: Returns static Clash data for the requested legacy data type.
      parameters:
      - description: Static data type
        in: path
        name: data_type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get legacy static JSON data
      tags:
      - Legacy Static Data
  /legends/clan/{clan_tag}/{date}:
    get:
      description: Returns clan data with legend league members for a specific day.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Legend day YYYY-MM-DD
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get clan legend day data
      tags:
      - Legacy Legends
  /legends/eos-winners:
    get:
      description: Returns season rank-one legend snapshots.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get legend end-of-season winners
      tags:
      - Legacy Legends
  /legends/streaks:
    get:
      description: Returns players ordered by their tracked legend streak.
      parameters:
      - description: Maximum number of rows
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get legend streak leaderboard
      tags:
      - Legacy Legends
  /legends/trophy-buckets:
    get:
      description: Returns histogram buckets for current legend trophy counts.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get legend trophy buckets
      tags:
      - Legacy Legends
  /list/seasons:
    get:
      description: Returns recent season identifiers in YYYY-MM format.
      parameters:
      - description: Number of previous months to include
        in: query
        name: last
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      summary: List recent seasons
      tags:
      - Legacy Lists
  /list/townhalls:
    get:
      description: Returns distinct town hall levels seen in tracked player stats.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: integer
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List tracked town halls
      tags:
      - Legacy Lists
  /permalink/{clan_tag}:
    get:
      description: Returns the clan badge image as a PNG.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - image/png
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get clan badge image
      tags:
      - Legacy Clans
  /player/{player_tag}/historical/{season}:
    get:
      description: Returns player history events grouped by event type for a season.
      parameters:
      - description: Player tag
        in: path
        name: player_tag
        required: true
        type: string
      - description: Season YYYY-MM
        in: path
        name: season
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
