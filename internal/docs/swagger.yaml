info:
  contact: {}
  description: ClashKing Go API documentation. Use Authorize with Bearer access tokens
    for protected routes. This API is still under active construction, so use it with
    caution because endpoints and payloads may still change.
  title: ClashKing API
  version: "1.0"
paths:
  /builderbaseleagues:
    get:
      description: Returns legacy builder base league metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get builder base leagues
      tags:
      - Other
  /cwl/{clanTag}/{season}:
    get:
      description: Returns the CWL group for a clan and season.
      parameters:
      - description: Clan tag
        in: path
        name: clanTag
        required: true
        type: string
      - description: Season YYYY-MM
        in: path
        name: season
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get CWL group by season
      tags:
      - War
  /cwl/{clanTag}/group:
    get:
      description: Returns the current season CWL group for a clan.
      parameters:
      - description: Clan tag
        in: path
        name: clanTag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get current CWL group
      tags:
      - War
  /global/counts:
    get:
      description: Returns global tracking counts used by legacy clients.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get global ClashKing counts
      tags:
      - Global
  /global/war/completed/daily:
    get:
      description: Returns completed war counts per day and war type.
      parameters:
      - description: Start Unix timestamp. Defaults to 90 days ago.
        in: query
        name: timestamp_start
        type: integer
      - description: End Unix timestamp
        in: query
        name: timestamp_end
        type: integer
      - description: 'War type filter. Repeatable. Values: random, friendly, cwl,
          all.'
        in: query
        name: war_type
        type: string
      - description: 'Comma-separated war type filter. Values: random,friendly,cwl.'
        in: query
        name: war_types
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get daily completed war counts
      tags:
      - War
  /global/war/townhall/{townhall_level}/hitrate/weekly:
    get:
      description: Returns weekly hitrate and average attack quality for a town hall
        level.
      parameters:
      - description: Town hall level
        in: path
        name: townhall_level
        required: true
        type: integer
      - description: Start Unix timestamp. Defaults to 90 days ago.
        in: query
        name: timestamp_start
        type: integer
      - description: End Unix timestamp
        in: query
        name: timestamp_end
        type: integer
      - description: 'War type filter. Repeatable. Values: random, friendly, all.
          CWL is not included for this endpoint.'
        in: query
        name: war_type
        type: string
      - description: 'Comma-separated war type filter. Values: random,friendly.'
        in: query
        name: war_types
        type: string
      - description: Only include same town hall attacks
        in: query
        name: same_townhall
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get weekly town hall war hitrate
      tags:
      - War
  /list/seasons:
    get:
      description: Returns recent season identifiers in YYYY-MM format.
      parameters:
      - description: Number of previous months to include
        in: query
        name: last
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      summary: List recent seasons
      tags:
      - Lists
  /list/townhalls:
    get:
      description: Returns distinct town hall levels seen in tracked player stats.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: integer
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List tracked town halls
      tags:
      - Lists
  /v2/activity/guild-summary:
    get:
      description: Returns clan and member activity totals for a Discord guild.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      - description: Days without login to be considered inactive (default 7)
        in: query
        name: inactive_threshold_days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get guild activity summary
      tags:
      - Activity & Inactivity
  /v2/auth/discord:
    post:
      consumes:
      - application/json
      description: Exchanges Discord OAuth credentials for a ClashKing session.
      parameters:
      - description: Discord OAuth payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AuthDiscordOAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate with Discord
      tags:
      - App Authentication
  /v2/auth/email:
    post:
      consumes:
      - application/json
      description: Validates email/password credentials and returns access and refresh
        tokens.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AuthEmailAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate with email
      tags:
      - App Authentication
  /v2/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Issues a password reset code for the matching email account.
      parameters:
      - description: Forgot password payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AuthForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Request password reset
      tags:
      - App Authentication
  /v2/auth/link-discord:
    post:
      consumes:
      - application/json
      description: Attaches a Discord account and stores its OAuth tokens for the
        current authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Link Discord to an existing account
      tags:
      - App Authentication
