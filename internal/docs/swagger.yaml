basePath: /
definitions:
  modelsv2.AccountsCOCAccountRequest:
    properties:
      api_token:
        type: string
      player_tag:
        type: string
      player_token:
        type: string
    type: object
  modelsv2.AccountsReorderAccountsRequest:
    properties:
      ordered_tags:
        items:
          type: string
        type: array
    type: object
  modelsv2.AuthDiscordOAuthRequest:
    properties:
      code:
        type: string
      code_verifier:
        type: string
      device_id:
        type: string
      device_name:
        type: string
      redirect_uri:
        type: string
    type: object
  modelsv2.AuthEmailAuthRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  modelsv2.AuthEmailCodeRequest:
    properties:
      code:
        type: string
      email:
        type: string
    type: object
  modelsv2.AuthEmailRegisterRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  modelsv2.AuthForgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  modelsv2.AuthRefreshTokenRequest:
    properties:
      device_id:
        type: string
      refresh_token:
        type: string
    type: object
  modelsv2.AuthResetPasswordRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      new_password:
        type: string
      reset_code:
        type: string
    type: object
  modelsv2.AuthResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/modelsv2.AuthUserInfo'
    type: object
  modelsv2.AuthUserInfo:
    properties:
      avatar_url:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  modelsv2.ClanPlayerTagsBody:
    properties:
      player_tags:
        items:
          type: string
        type: array
    type: object
  modelsv2.ClanTagsBody:
    properties:
      clan_tags:
        items:
          type: string
        type: array
    type: object
  modelsv2.GuildDetails:
    properties:
      banner:
        type: string
      boost_count:
        type: integer
      description:
        type: string
      features:
        items:
          type: string
        type: array
      icon:
        type: string
      id:
        type: string
      member_count:
        type: integer
      name:
        type: string
      owner_id:
        type: string
      premium_tier:
        type: integer
    type: object
  modelsv2.GuildInfo:
    properties:
      features:
        items:
          type: string
        type: array
      has_bot:
        type: boolean
      icon:
        type: string
      id:
        type: string
      member_count:
        type: integer
      name:
        type: string
      owner:
        type: boolean
      permissions:
        type: string
      role:
        type: string
    type: object
  modelsv2.MobilePlayerTagsRequest:
    properties:
      clan_tags:
        additionalProperties:
          type: string
        type: object
      player_tags:
        items:
          type: string
        type: array
    type: object
  modelsv2.ServerPanelBody:
    properties:
      button_color:
        type: string
      buttons:
        items:
          type: string
        type: array
      embed_name:
        type: string
      welcome_channel:
        type: integer
    type: object
  modelsv2.TrackingPlayerListRequest:
    properties:
      tags:
        items:
          type: string
        type: array
    type: object
  modelsv2.WarClanTagsBody:
    properties:
      clan_tags:
        items:
          type: string
        type: array
    type: object
  modelsv2.WarPlayersBody:
    properties:
      players:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
  description: ClashKing Go API documentation. Public Swagger lists only unauthenticated
    endpoints; private Swagger includes the full API and supports Authorization headers
    for secured endpoints. This API is still under active construction, so use it
    with caution because endpoints and payloads may still change.
  title: ClashKing API
  version: "1.0"
paths:
  /v2/{category}:
    get:
      description: Returns static items for a category, with optional filters applied.
      parameters:
      - description: Category name
        in: path
        name: category
        required: true
        type: string
      - description: Locale code
        in: query
        name: locale
        type: string
      - description: Substring to filter item names
        in: query
        name: name
        type: string
      - description: Village filter
        in: query
        name: village
        type: string
      - description: Type filter
        in: query
        name: type
        type: string
      - description: Category filter
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get category items
      tags:
      - Static Data
  /v2/{category}/{item_id_or_name}:
    get:
      description: Returns a static data item resolved by item ID or name.
      parameters:
      - description: Category name
        in: path
        name: category
        required: true
        type: string
      - description: Item ID or name
        in: path
        name: item_id_or_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get category item by id
      tags:
      - Static Data
  /v2/{category}/{item_id_or_name}/maxlevel:
    get:
      description: Returns the highest level defined for a static item.
      parameters:
      - description: Category name
        in: path
        name: category
        required: true
        type: string
      - description: Item ID or name
        in: path
        name: item_id_or_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get item max level
      tags:
      - Static Data
  /v2/{category}/names:
    get:
      description: Returns the names of static items for a category, with optional
        filters applied.
      parameters:
      - description: Category name
        in: path
        name: category
        required: true
        type: string
      - description: Locale code
        in: query
        name: locale
        type: string
      - description: Substring to filter item names
        in: query
        name: name
        type: string
      - description: Village filter
        in: query
        name: village
        type: string
      - description: Type filter
        in: query
        name: type
        type: string
      - description: Category filter
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get category names
      tags:
      - Static Data
  /v2/{server_id}/giveaways:
    get:
      description: Returns all giveaways for a server split by status (ongoing, scheduled,
        ended).
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get server giveaways
      tags:
      - Server Giveaways
    post:
      consumes:
      - multipart/form-data
      description: Creates a new giveaway. Accepts multipart/form-data with optional
        image upload.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Prize description
        in: formData
        name: prize
        required: true
        type: string
      - description: End time (ISO 8601)
        in: formData
        name: end_time
        required: true
        type: string
      - description: Number of winners
        in: formData
        name: winners
        required: true
        type: integer
      - description: Discord channel ID
        in: formData
        name: channel_id
        required: true
        type: string
      - description: Start time (ISO 8601)
        in: formData
        name: start_time
        type: string
      - description: Start immediately (true/false)
        in: formData
        name: now
        type: string
      - description: Giveaway banner image
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create a server giveaway
      tags:
      - Server Giveaways
  /v2/{server_id}/giveaways/{giveaway_id}:
    delete:
      description: Deletes a giveaway and its image from the CDN if applicable.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Giveaway ID
        in: path
        name: giveaway_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete a server giveaway
      tags:
      - Server Giveaways
    get:
      description: Returns a single giveaway by ID for a server.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Giveaway ID
        in: path
        name: giveaway_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get a specific server giveaway
      tags:
      - Server Giveaways
    put:
      consumes:
      - multipart/form-data
      description: Updates an existing giveaway. Accepts multipart/form-data with
        optional image upload.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Giveaway ID
        in: path
        name: giveaway_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update a server giveaway
      tags:
      - Server Giveaways
  /v2/{server_id}/giveaways/{giveaway_id}/reroll:
    post:
      consumes:
      - application/json
      description: Replaces selected winners of an ended giveaway with new ones drawn
        at random.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Giveaway ID
        in: path
        name: giveaway_id
        required: true
        type: string
      - description: user_ids_to_replace
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Reroll giveaway winners
      tags:
      - Server Giveaways
  /v2/{server_id}/leaderboards:
    get:
      description: Returns top players and clans for a Discord server based on ranking
        data.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Max players to return (default 100, max 500)
        in: query
        name: limit_players
        type: integer
      - description: Max clans to return (default 50, max 200)
        in: query
        name: limit_clans
        type: integer
      - description: 'Sort by: global_rank, local_rank, trophies, legend_trophies'
        in: query
        name: sort_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get server leaderboards
      tags:
      - Server Leaderboards
  /v2/{server_id}/panel:
    get:
      description: Returns the welcome panel configuration for a server.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get server welcome panel
      tags:
      - Server Panels
    put:
      consumes:
      - application/json
      description: Updates the welcome panel configuration for a server.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Panel configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.ServerPanelBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update server welcome panel
      tags:
      - Server Panels
  /v2/capital/guild-leaderboard:
    get:
      description: Returns a capital leaderboard for all clans attached to the requested
        guild.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      - description: Season filter (YYYY-MM)
        in: query
        name: season
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get capital guild leaderboard
      tags:
      - Capital Raids
  /v2/capital/player-stats:
    get:
      description: Returns raid weekend player rows for the requested guild and clan
        tags.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      - collectionFormat: csv
        description: Clan tags (defaults to all guild clans)
        in: query
        items:
          type: string
        name: clan_tags
        type: array
      - description: Season filter (YYYY-MM)
        in: query
        name: season
        type: string
      - description: Maximum number of rows
        in: query
        name: limit
        type: integer
      - description: Number of rows to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get capital player statistics
      tags:
      - Capital Raids
  /v2/categories:
    get:
      description: Returns all available static data categories and item counts.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get static categories
      tags:
      - Static Data
  /v2/cdn/upload:
    post:
      consumes:
      - multipart/form-data
      description: Uploads an arbitrary file and returns its public CDN URL. Requires
        authentication.
      parameters:
      - description: File to upload (max 25 MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: Request Entity Too Large
          schema:
            additionalProperties:
              type: string
            type: object
        "415":
          description: Unsupported Media Type
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Upload a file to the ClashKing CDN
      tags:
      - CDN
  /v2/clan/{clan_tag}/board/totals:
    get:
      description: Returns aggregate board totals for one or more player tags.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Player tags
        in: body
        name: body
        schema:
          $ref: '#/definitions/modelsv2.ClanPlayerTagsBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get aggregated board totals for a clan
      tags:
      - Clan
  /v2/clan/{clan_tag}/details:
    get:
      description: Returns the live clan object for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get full stats for a single clan
      tags:
      - Clan
  /v2/clan/{clan_tag}/donations/{season}:
    get:
      description: Returns donation totals for a single clan and season.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Season
        in: path
        name: season
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get clan donations
      tags:
      - Clan
  /v2/clan/{clan_tag}/join-leave:
    get:
      description: Returns join and leave history for a single clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Maximum number of results
        in: query
        name: limit
        type: integer
      - description: Start timestamp
        in: query
        name: timestamp_start
        type: integer
      - description: End timestamp
        in: query
        name: time_stamp_end
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Join Leaves in a season
      tags:
      - Clan
  /v2/clan/{clan_tag}/ranking:
    get:
      description: Returns the cached ranking document for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get ranking of a clan
      tags:
      - Clan
  /v2/clan/compo:
    get:
      description: Returns town hall, role, and league composition for the requested
        clan tags.
      parameters:
      - collectionFormat: csv
        description: Clan tags
        in: query
        items:
          type: string
        name: clan_tags
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get composition of a clan or clans
      tags:
      - Clan
  /v2/clan/donations/{season}:
    get:
      description: Returns donation totals for multiple clans in a season.
      parameters:
      - description: Season
        in: path
        name: season
        required: true
        type: string
      - collectionFormat: csv
        description: Clan tags
        in: query
        items:
          type: string
        name: clan_tags
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get donations for many clans
      tags:
      - Clan
  /v2/clans/capital-raids:
    post:
      description: Returns raid weekend documents for the requested clan tags.
      parameters:
      - description: Clan tags
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.ClanTagsBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
