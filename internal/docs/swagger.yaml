basePath: /
definitions:
  accounts.cocAccountRequest:
    properties:
      api_token:
        type: string
      player_tag:
        type: string
      player_token:
        type: string
    type: object
  accounts.reorderAccountsRequest:
    properties:
      ordered_tags:
        items:
          type: string
        type: array
    type: object
  authmodule.authResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/authmodule.userInfo'
    type: object
  authmodule.discordOAuthRequest:
    properties:
      code:
        type: string
      code_verifier:
        type: string
      device_id:
        type: string
      device_name:
        type: string
      redirect_uri:
        type: string
    type: object
  authmodule.emailAuthRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  authmodule.emailCodeRequest:
    properties:
      code:
        type: string
      email:
        type: string
    type: object
  authmodule.emailRegisterRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  authmodule.forgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  authmodule.refreshTokenRequest:
    properties:
      device_id:
        type: string
      refresh_token:
        type: string
    type: object
  authmodule.resetPasswordRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      new_password:
        type: string
      reset_code:
        type: string
    type: object
  authmodule.userInfo:
    properties:
      avatar_url:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  clan.clanTagsBody:
    properties:
      clan_tags:
        items:
          type: string
        type: array
    type: object
  clan.playerTagsBody:
    properties:
      player_tags:
        items:
          type: string
        type: array
    type: object
  guilds.guildDetails:
    properties:
      banner:
        type: string
      boost_count:
        type: integer
      description:
        type: string
      features:
        items:
          type: string
        type: array
      icon:
        type: string
      id:
        type: string
      member_count:
        type: integer
      name:
        type: string
      owner_id:
        type: string
      premium_tier:
        type: integer
    type: object
  guilds.guildInfo:
    properties:
      features:
        items:
          type: string
        type: array
      has_bot:
        type: boolean
      icon:
        type: string
      id:
        type: string
      member_count:
        type: integer
      name:
        type: string
      owner:
        type: boolean
      permissions:
        type: string
      role:
        type: string
    type: object
  mobile.playerTagsRequest:
    properties:
      clan_tags:
        additionalProperties:
          type: string
        type: object
      player_tags:
        items:
          type: string
        type: array
    type: object
  v1capital.clanTagsBody:
    properties:
      clan_tags:
        items:
          type: string
        type: array
    type: object
  war.clanTagsBody:
    properties:
      clan_tags:
        items:
          type: string
        type: array
    type: object
  war.warPlayersBody:
    properties:
      players:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
  description: Go Fiber rewrite of the ClashKing API.
  title: ClashKingAPI
  version: 2.0.0
paths:
  /capital/{clan_tag}:
    get:
      description: Returns raid weekend logs for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Log of Raid Weekends
      tags:
      - Clan Capital Endpoints
  /capital/bulk:
    post:
      description: Returns raid weekend documents for up to one hundred clan tags.
      parameters:
      - description: Clan tags
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/v1capital.clanTagsBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Fetch Raid Weekends in Bulk
      tags:
      - Clan Capital Endpoints
  /capital/stats/district:
    get:
      description: Returns capital raid weekends for the requested weekend.
      parameters:
      - description: Weekend
        in: query
        name: weekend
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Capital district stats
      tags:
      - Clan Capital Endpoints
  /capital/stats/leagues:
    get:
      description: Returns capital raid weekends grouped as league stats for the requested
        weekend.
      parameters:
      - description: Weekend
        in: query
        name: weekend
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Capital league stats
      tags:
      - Clan Capital Endpoints
  /clan/{clan_tag}/basic:
    get:
      description: Returns the cached clan object for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Basic Clan Object
      tags:
      - Clan Endpoints
  /clan/{clan_tag}/historical:
    get:
      description: Returns historical player data for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Start timestamp
        in: query
        name: timestamp_start
        type: integer
      - description: End timestamp
        in: query
        name: time_stamp_end
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Historical data for a clan
      tags:
      - Clan Endpoints
  /clan/{clan_tag}/join-leave:
    get:
      description: Returns join and leave history for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Start timestamp
        in: query
        name: timestamp_start
        type: integer
      - description: End timestamp
        in: query
        name: time_stamp_end
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Join leaves in a season
      tags:
      - Clan Endpoints
  /clan/search:
    get:
      description: Returns clans filtered by location, membership, and limit options.
      parameters:
      - description: Location ID
        in: query
        name: location_id
        type: integer
      - description: Maximum number of results
        in: query
        name: limit
        type: integer
      - description: Include member list
        in: query
        name: member_list
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Search clans by filtering
      tags:
      - Clan Endpoints
  /v2/activity/guild-summary:
    get:
      description: Returns clan and member activity totals for a Discord guild.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get guild activity summary
      tags:
      - Activity & Inactivity
  /v2/activity/inactive-players:
    get:
      description: Returns players in the guild that are considered inactive by the
        provided threshold.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      - description: Days before a player is considered inactive
        in: query
        name: inactive_threshold_days
        type: integer
      - description: Minimum town hall
        in: query
        name: min_townhall
        type: integer
      - description: Restrict results to a single clan
        in: query
        name: clan_tag
        type: string
      - description: Maximum number of results
        in: query
        name: limit
        type: integer
      - description: Number of results to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get inactive players
      tags:
      - Activity & Inactivity
  /v2/auth/discord:
    post:
      consumes:
      - application/json
      description: Exchanges Discord OAuth credentials for a ClashKing session.
      parameters:
      - description: Discord OAuth payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.discordOAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authmodule.authResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "501":
          description: Not Implemented
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate with Discord
      tags:
      - App Authentication
  /v2/auth/email:
    post:
      consumes:
      - application/json
      description: Validates email/password credentials and returns access and refresh
        tokens.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.emailAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authmodule.authResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate with email
      tags:
      - App Authentication
  /v2/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Issues a password reset code for the matching email account.
      parameters:
      - description: Forgot password payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Request password reset
      tags:
      - App Authentication
  /v2/auth/link-discord:
    post:
      description: Placeholder endpoint for Discord account linking.
      produces:
      - application/json
      responses:
        "501":
          description: Not Implemented
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Link Discord to an existing account
      tags:
      - App Authentication
  /v2/auth/link-email:
    post:
      consumes:
      - application/json
      description: Attaches email credentials to the authenticated account.
      parameters:
      - description: Link email payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.emailRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Link Email to an existing Discord account
      tags:
      - App Authentication
  /v2/auth/me:
    get:
      description: Returns the authenticated user's current profile information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authmodule.userInfo'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get current user information
      tags:
      - App Authentication
  /v2/auth/refresh:
    post:
      consumes:
      - application/json
      description: Validates a refresh token and returns a new access token for the
        same user.
      parameters:
      - description: Refresh token payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.refreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Refresh the access token
      tags:
      - App Authentication
  /v2/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a pending email registration and issues a verification
        code.
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.emailRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Register with email
      tags:
      - App Authentication
  /v2/auth/resend-verification:
    post:
      consumes:
      - application/json
      description: Resends the verification code for a pending email registration.
      parameters:
      - description: Email payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "410":
          description: Gone
          schema:
            additionalProperties: true
            type: object
      summary: Resend verification email
      tags:
      - App Authentication
  /v2/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Validates a password reset token and updates the account password.
      parameters:
      - description: Reset password payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authmodule.authResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Reset password with token
      tags:
      - App Authentication
  /v2/auth/verify-email-code:
    post:
      consumes:
      - application/json
      description: Confirms a pending email registration by checking the verification
        code and creates the account session.
      parameters:
      - description: Verification payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authmodule.emailCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authmodule.authResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Verify email address with 6-digit code
      tags:
      - App Authentication
  /v2/capital/guild-leaderboard:
    get:
      description: Returns a capital leaderboard for all clans attached to the requested
        guild.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      - description: Season filter
        in: query
        name: season
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get capital guild leaderboard
      tags:
      - Capital Raids
  /v2/capital/player-stats:
    get:
      description: Returns raid weekend player rows for the requested guild and clan
        tags.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      - collectionFormat: csv
        description: Clan tags
        in: query
        items:
          type: string
        name: clan_tags
        required: true
        type: array
      - description: Season filter
        in: query
        name: season
        type: string
      - description: Maximum number of rows
        in: query
        name: limit
        type: integer
      - description: Number of rows to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get capital player statistics
      tags:
      - Capital Raids
  /v2/clan/{clan_tag}/board/totals:
    get:
      description: Returns aggregate board totals for one or more player tags.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Player tags
        in: body
        name: body
        schema:
          $ref: '#/definitions/clan.playerTagsBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get aggregated board totals for a clan
      tags:
      - Clan
  /v2/clan/{clan_tag}/details:
    get:
      description: Returns the live clan object for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get full stats for a single clan
      tags:
      - Clan
  /v2/clan/{clan_tag}/donations/{season}:
    get:
      description: Returns donation totals for a single clan and season.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Season
        in: path
        name: season
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get clan donations
      tags:
      - Clan
  /v2/clan/{clan_tag}/join-leave:
    get:
      description: Returns join and leave history for a single clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      - description: Maximum number of results
        in: query
        name: limit
        type: integer
      - description: Start timestamp
        in: query
        name: timestamp_start
        type: integer
      - description: End timestamp
        in: query
        name: time_stamp_end
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Join Leaves in a season
      tags:
      - Clan
  /v2/clan/{clan_tag}/members:
    get:
      description: Returns the current members for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get Clan Members
      tags:
      - Clan
  /v2/clan/{clan_tag}/ranking:
    get:
      description: Returns the cached ranking document for a clan tag.
      parameters:
      - description: Clan tag
        in: path
        name: clan_tag
