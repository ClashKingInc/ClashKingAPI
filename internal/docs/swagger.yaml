info:
  contact: {}
  description: ClashKing Go API documentation. Use Authorize with Bearer access tokens
    for protected routes. This API is still under active construction, so use it with
    caution because endpoints and payloads may still change.
  title: ClashKing API
  version: "1.0"
paths:
  /builderbaseleagues:
    get:
      description: Returns legacy builder base league metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.BuilderBaseLeaguesResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: Get builder base leagues
      tags:
      - Other
  /cwl/{clanTag}/{season}:
    get:
      description: Returns the CWL group for a clan and season.
      parameters:
      - description: Clan tag
        in: path
        name: clanTag
        required: true
        type: string
      - description: Season YYYY-MM
        in: path
        name: season
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.CWLGroupResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: Get CWL group by season
      tags:
      - War
  /cwl/{clanTag}/group:
    get:
      description: Returns the current season CWL group for a clan.
      parameters:
      - description: Clan tag
        in: path
        name: clanTag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.CWLGroupResponse'
      summary: Get current CWL group
      tags:
      - War
  /global/counts:
    get:
      description: Returns global tracking counts used by legacy clients.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.GlobalCountsResponse'
      summary: Get global ClashKing counts
      tags:
      - Global
  /list/seasons:
    get:
      description: Returns recent season identifiers in YYYY-MM format.
      parameters:
      - description: Number of previous months to include
        in: query
        name: last
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      summary: List recent seasons
      tags:
      - Lists
  /list/townhalls:
    get:
      description: Returns distinct town hall levels seen in tracked player stats.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: integer
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: List tracked town halls
      tags:
      - Lists
  /v2/activity/guild-summary:
    get:
      description: Returns clan and member activity totals for a Discord guild.
      parameters:
      - description: Discord guild ID
        in: query
        name: guild_id
        required: true
        type: integer
      - description: Days without login to be considered inactive (default 7)
        in: query
        name: inactive_threshold_days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.GuildSummaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: Get guild activity summary
      tags:
      - Activity & Inactivity
  /v2/app/announcements:
    get:
      description: Returns mobile app announcements.
      parameters:
      - description: draft, scheduled, published, or archived
        enum:
        - draft
        - scheduled
        - published
        - archived
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.AnnouncementListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List app announcements
      tags:
      - Mobile App
    post:
      consumes:
      - application/json
      description: Creates a mobile app announcement.
      parameters:
      - description: Announcement payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.Announcement'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create app announcement
      tags:
      - Mobile App
  /v2/app/announcements/{id}:
    delete:
      description: Archives a mobile app announcement.
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.Announcement'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Archive app announcement
      tags:
      - Mobile App
    get:
      description: Returns one mobile app announcement.
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.Announcement'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: Get app announcement
      tags:
      - Mobile App
    put:
      consumes:
      - application/json
      description: Updates a mobile app announcement.
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: string
      - description: Announcement payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.Announcement'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update app announcement
      tags:
      - Mobile App
  /v2/app/announcements/active:
    get:
      description: Returns the currently active mobile app announcement, if one exists.
      parameters:
      - description: all, ios, or android
        enum:
        - all
        - ios
        - android
        in: query
        name: target
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.ActiveAnnouncementResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: Get active app announcement
      tags:
      - Mobile App
  /v2/auth/discord:
    post:
      consumes:
      - application/json
      description: Exchanges Discord OAuth credentials for a ClashKing session.
      parameters:
      - description: Discord OAuth payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AuthDiscordOAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: Authenticate with Discord
      tags:
      - App Authentication
  /v2/auth/email:
    post:
      consumes:
      - application/json
      description: Validates email/password credentials and returns access and refresh
        tokens.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AuthEmailAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      summary: Authenticate with email
      tags:
      - App Authentication
  /v2/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Issues a password reset code for the matching email account.
      parameters:
      - description: Forgot password payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/modelsv2.AuthForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.AuthForgotPasswordResponse'
        "400":
