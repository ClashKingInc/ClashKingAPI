    get:
      description: Fetches up to 5,000 Discord members (cached for 15 minutes), excludes
        bots, joins visible links with basic_player, and supports member, player-tag,
        role-mention, and account filters. Multiple Discord role mentions are combined
        as a union.
      parameters:
      - description: Server ID
        in: path
        name: server_id
        required: true
        type: integer
      - description: Max members returned (default 100, maximum 5000)
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: Player tag, member username/display name, or one or more leading
          Discord role mentions
        in: query
        name: query
        type: string
      - description: Member account filter; none means no visible links
        enum:
        - none
        in: query
        name: account_filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsv2.ServerLinksResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/modelsv2.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get links for Discord server members
      tags:
      - Links
    post:
      consumes:
      - application/json
      description: Adds an unverified player link to a current Discord member. An
        existing unverified link is reassigned; a verified link owned by another user
        is never moved.
      parameters:
      - description: Server ID
        in: path
        name: server_id
