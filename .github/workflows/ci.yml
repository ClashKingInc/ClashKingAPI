name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Build ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout clashy.go
        uses: actions/checkout@v6
        with:
          repository: ClashKingInc/clashy.go
          path: clashy.go

      - name: Fix replace directive
        run: go mod edit -replace github.com/clashkinginc/clashy.go=./clashy.go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

  # --- Vet --------------------------------------------------------------------
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout clashy.go
        uses: actions/checkout@v6
        with:
          repository: ClashKingInc/clashy.go
          path: clashy.go

      - name: Fix replace directive
        run: go mod edit -replace github.com/clashkinginc/clashy.go=./clashy.go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

  # --- Tests ------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout clashy.go
        uses: actions/checkout@v6
        with:
          repository: ClashKingInc/clashy.go
          path: clashy.go

      - name: Fix replace directive
        run: go mod edit -replace github.com/clashkinginc/clashy.go=./clashy.go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # --- SonarCloud -------------------------------------------------------------
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref == 'refs/heads/master' || github.event_name == 'pull_request') && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.go.coverage.reportPaths=coverage.out
