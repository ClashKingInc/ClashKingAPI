# Sources — Go only
sonar.sources=.

# Exclude Python, deps, generated files, and caches
sonar.exclusions=**/*.py,**/node_modules/**,**/__pycache__/**,**/vendor/**,clashy.go/**,**/*.json,**/*.lock,**/package-lock.json,**/poetry.lock,**/uv.lock

# Go
sonar.go.coverage.reportPaths=coverage.out

# Disable SCM blame (speeds up scan)
sonar.scm.disabled=true

# Tests
sonar.tests=.
sonar.test.inclusions=**/*_test.go
